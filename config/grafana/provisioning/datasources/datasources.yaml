  #     backendType: pyroscope

  # - name: Postgres
  #   type: postgres
  #   uid: postgres
  #   url: mythical-database:5432
  #   user: postgres
  #   jsonData:
  #     database: postgres
  #     sslmode: disable
  #     postgresVersion: 1400
