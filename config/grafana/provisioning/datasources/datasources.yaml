apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    editable: true
    url: http://nginx:3100
    jsonData:
      httpHeaderName1: "X-Scope-OrgID"
    secureJsonData:
      httpHeaderValue1: "tenant1"

  - name: Prometheus
    type: prometheus
    access: proxy
    isDefault: true
    editable: true
    url: http://prometheus:9090

  - name: Mimir
    type: prometheus
    access: proxy
    uid: mimir
    url: http://mimir:9009/prometheus
    jsonData:
      exemplarTraceIdDestinations:
        - datasourceUid: tempo
          name: traceID
      httpMethod: POST
      timeInterval: "2s"

  # - name: Pyroscope
  #   type: phlare
  #   access: proxy
  #   uid: pyroscope
  #   url: http://pyroscope:4040
