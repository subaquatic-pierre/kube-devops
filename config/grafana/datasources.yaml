apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    isDefault: true
    editable: true
    url: http://prometheus:9090

  - name: Loki
    type: loki
    access: proxy
    editable: true
    url: http://loki-nginx:3100
    jsonData:
      httpHeaderName1: "X-Scope-OrgID"
    secureJsonData:
      httpHeaderValue1: "tenant1"
