apiVersion: v1
items:
  # --- Docker registry credentials ---
  # Replace with your own base64-encoded Docker config JSON.
  # Generate via: cat ~/.docker/config.json | base64 -w0
  - apiVersion: v1
    kind: Secret
    metadata:
      name: regcred
      namespace: project
    type: kubernetes.io/dockerconfigjson
    data:
      .dockerconfigjson: <base64-docker-config-json>

  # --- App ConfigMap ---
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: project-config
      namespace: project
    data:
      ENVIRONMENT: production

kind: List
metadata:
  resourceVersion: ""
